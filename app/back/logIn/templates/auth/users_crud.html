<table>
    <thead>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>
                <form action="{% url 'edit_user' user.id %}" method="get">
                    <input type="submit" value="Edit">
                </form>
                <form action="{% url 'delete_user' user.id %}" method="post">
                    {% csrf_token %}
                    <input type="submit" value="Delete">
                </form>

            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
