{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <title>OTEG Admin | {{ title }} </title>

    <!-- Custom fonts for this template-->
    <link href="{% static 'admin/vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="{% static 'admin/css/sb-admin-2.css' %}" rel="stylesheet">

    <!-- Sweetalert2 -->
    <script src="{% static 'librerias/sweetalert2-11.7.1/sweetalert2.all.min.js' %}"></script>

    <!-- Functions -->
    <!-- <script src="{% static 'admin/js/main.js' %}"></script> -->
    <!-- <script src="{% static 'admin/js/functions.js' %}"></script> -->
    <!-- CSS de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">

    <link href="{% static 'scss/menu.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'scss/sidebar.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'scss/sidebar2.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'scss/table.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'scss/tablas.css' %}" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.0.7/css/boxicons.min.css">

    <!-- block de header D -->
    {% block head %}

    {% endblock %}



</head>

<body>

 
    <div class="container-fluid p-0">
        

        <div class="container-sidebar2">
            <!-- sidebar2 -->
            {% include 'back/components/sidebar2.html' %}
        </div>
        <div class="container-sidebar">
            <!-- sidebar -->
            {% include 'back/components/sidebar.html' %}
        </div>
        <div  class="inner-header pl-3">
            <div class="container-fluid title-container">
                <i class='bx bx-menu'></i>
                <label class="title" >{{title}}</label>
                <!-- <h5 class="subtitle mb-0">{{title}}</h5> -->
            </div>
        </div>
        
    
        <div>
            <div class="container-fluid breadcrumb-container  justify-content-end align-items-center  mb-5" style="padding-right: 30px; padding-left: 63px;">

                <label class="m-0" >Inicio > publicaciones > add</label>
            </div>
        </div>
    
        <div  class="inner-c pl-3">
            <div class="container-fluid">
                <div class="row">
                    {% block content %}

                    {% endblock %}
                </div>
            
            </div>
            
            
        </div>
    
        <div class="inner-footer  ">
            <div class="container-fluid-footer ">
                <label >OTEG ® {{year}} | Todos los derechos reservados
                </label>
                </div>
                
        </div>
    </div>
      
                



    <!-- Bootstrap core JavaScript-->
    <script src="{% static 'admin/vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'admin/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <!-- Core plugin JavaScript-->
    <script src="{% static 'admin/vendor/jquery-easing/jquery.easing.min.js' %}"></script>

    <!-- Custom scripts for all pages-->
    <!-- <script src="{% static 'admin/js/sb-admin-2.min.js' %}"></script> -->

    <!-- Page level plugins -->
    <script>
        const arrows = document.querySelectorAll(".arrow");

        arrows.forEach((arrow) => {
        arrow.addEventListener("click", (e) => {
            const arrowParent = e.target.closest(".arrow").parentElement.parentElement;
            arrowParent.classList.toggle("showMenu");
        });
        });

        const divTitle = document.querySelector(".inner-header");
        const divContainer = document.querySelector(".inner-c");
        const sidebar = document.querySelector(".sidebar");
        const sidebarBtn = document.querySelector(".bx-menu");

        sidebarBtn.addEventListener("click", () => {
            console.log("dssd")
            sidebar.classList.toggle("close");
            divContainer.classList.toggle("dropped");
            divTitle.classList.toggle("dropped");
        });


    </script>

    <!-- block de footer js -->
    {% block footerjs %}

    {% endblock %}

    <!-- Block javascript D-->
    {% block javascript %}

    {% endblock %}




</body>

</html>
