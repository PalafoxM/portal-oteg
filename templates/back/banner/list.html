{% extends 'back/list.html' %}
{% load static %}
{% block head_list %}
    <!-- <script src="{% static 'admin/banner/list.js' %}"></script> -->
{% endblock %}

{% block columns %}
    <tr>
        <th scope="col" style="width: 10%;">id</th>
        <th scope="col" style="width: 20%;">Nombre</th>
        <th scope="col" style="width: 20%;">Opciones</th>
    </tr>
{% endblock %}

{% block rows %}
                    {% for banner in banners %}
                        <tr>
                            <th>{{ banner.id }}</th>
                            <th>{{banner.name}}</th>
                            <th>
                                <a href="{% url 'colaboradores:banner_delete' banner.id %}" class="btn btn-danger btn-icon-split">
                                    <span class="icon text-white-50">
                                        <i class="fas fa-trash"></i>
                                    </span>
                                    <span class="text">Eliminar</span>
                                </a>
                                <a href="{% url 'colaboradores:banner_update' banner.id %}" class="btn btn-primary btn-icon-split">
                                    <span class="icon text-white-50">
                                        <i class="fas fa-edit"></i>
                                    </span>
                                    <span class="text">Editar</span>
                                </a>
                            </th>
                        </tr>
                    {% endfor %}
{% endblock %}

{% block javascript %}
{% endblock %}
