{% extends 'back/components/list.html' %}
{% load static %}
{% block head_list %}
<!-- <script src="{% static 'admin/banner/list.js' %}"></script> -->
{% endblock %}

{% block columns %}
<tr class="text-center table-header">
    <th scope="col" style="width: 10%;">id</th>
    <th scope="col" style="width: 20%;">Seccion </th>
    <th scope="col" style="width: 10%;">Acciones </th>
    {% endblock %}

    {% block rows %}
    {% for e in categorias_list %}
<tr>
    <th class="text-left tb-text">{{e.id}}</th>
    <th class="text-left tb-text">{{e.nombre_categoria }}</th>
    <th   class="text-left actions-column tb-text" style="
    position: relative;
    background-color: #ECF0F1;
    text-align: center;
    height: 100%;
    ">

        <div class="icon-container">

            
            <form method="get" action="{% url 'dashboard:categoria_update' seccion_pk=e.seccion.pk pk=e.id %}"
                style='margin-right: 10px;'
            >
                {% csrf_token %}
                <button type="submit" class="ml-1 mr-1 actions-btn">
                        <i class="fas fa-edit"></i>
                </button>
            </form>

            <form method="post" action="{% url 'dashboard:categoria_delete' seccion_pk=e.seccion.pk pk=e.id %}">
                {% csrf_token %}
                <button type="submit" class="actions-btn"
                    onclick="return confirm('¿Está seguro de que desea eliminar la informacion?');">
               
                        <i class="fas fa-trash"></i>
                </button>
            </form>
        </div>
        
    </th>
</tr>
{% endfor %}
{% endblock %}
