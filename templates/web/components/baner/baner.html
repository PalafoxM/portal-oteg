<div class="banner">
    {% load static %}

    <!doctype html>
    <html lang="en">

    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">

        <title>OTEG</title>

        <!-- custom css -->
        <link rel="stylesheet" href="{% static 'web/css/baner.css' %}">


        <!-- animate css link -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

        <!-- google font link -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" rel="stylesheet">
    </head>

    <body>

        <!-- slider section -->
        <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">

                {% for baner in banners %}
                    <button type="button" data-bs-target="#carouselExampleCaptions"
                        data-bs-slide-to="{{ forloop.counter0 }}" class="{% if forloop.counter0 == 0 %}active{% endif %}" aria-current="flase" aria-label="Slide 1"></button>
                {% endfor %}

            </div>
            <div class="carousel-inner">
                {% for object in banners%}
                <div class="carousel-item {% if forloop.counter0 == 0 %}active{% endif %}">
                    
                    <a href="{{object.banner_url}}">
                        <div class="image-container">
                            <img src="{{object.imagen.url}}" class="" alt="sliderImg">
                        </div>
                    </a>

                    <div class="carousel-caption d-none d-md-block">
                        <h1 class="animate__animated
                        {% if forloop.counter0 == 0 %}
                        animate__fadeInDown
                        {% endif %}
                        {% if forloop.revcounter == 1 %}
                        animate__bounce
                        {% endif %}
                        {% if forloop.revcounter == 2 %}
                        animate__fadeInRight
                        {% endif %}">{{object.title}}</h1>
                        <h3 class="animate__animated animate__zoomIn">{{object.sub_title}}</h3>
                        <a href="{{object.link}}"
                            class="button animate__animated animate__zoomIn mt-3 py-3 px-5 btn font-weight-bold">{{object.action_name}}</a>
                    </div>
                </div>

                {% endfor %}
            </div>
        </div>

        <!-- Option 1: Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj"
            crossorigin="anonymous"></script>
    </body>

    </html>

    {% block banner-content %}{% endblock %}
</div>
