{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <link
    href="https://fonts.googleapis.com/css?family=Roboto:100,100i,300,300i,400,400i,500,500i,700,700i,900,900i&display=swap"
    rel="stylesheet">

  <title>OTEG |</title>

  <!-- Bootstrap core CSS -->
  <link rel="stylesheet" href="{% static 'librerias/bootstrap/css/bootstrap.min.css' %}">

  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- Block head style -->
  {% block head %}

  {% endblock %}
  <style>
    /* Estilos para el botón de Google Translate */
    #google_translate_element {
      display: inline-block;
      margin-right: 10px;
    }
    .goog-te-combo {
      border-color: #ccc;
      color: #333;
    }
    .goog-te-combo option {
      color: #333;
    }
  </style>
  

</head>

<body>
  

  {% block body %}

  {% endblock %}

  <!-- Bootstrap core JavaScript -->
  <!-- <script src="{% static 'lib/jquery/jquery.min.js' %}"></script> -->
  <script src="{% static 'lib/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'es', includedLanguages: 'en,fr', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }

    function setFixedMenuPosition() {
      var translateElement = document.getElementById('google_translate_element');
      if (translateElement) {
        var translateHeight = translateElement.offsetHeight;
        var fixedMenu = document.getElementsByClassName('all-fixed')[0];
        fixedMenu.style.top = translateHeight + 'px';
      } else {
        var fixedMenu = document.getElementsByClassName('all-fixed')[0];
        fixedMenu.style.top = '0';
      }
    }
    window.onload = setFixedMenuPosition;
  </script>

</body>

</html>
